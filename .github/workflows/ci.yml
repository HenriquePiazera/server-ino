name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-build-secret-minimum-32-characters-long
          NEXTAUTH_SECRET: ci-build-secret-minimum-32-characters-long
          NEXTAUTH_URL: http://localhost:3000
          ENCRYPTION_MASTER_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXMh
